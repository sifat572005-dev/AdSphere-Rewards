<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdSphere Rewards - Fixed Edition</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src='//libtl.com/sdk.js' data-zone='10935540' data-sdk='show_10935540'></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #070B14; color: #E8EAF0; overflow-x: hidden; }
  :root { --gold: #F5C842; --gold-glow: rgba(245, 200, 66, 0.4); --accent: #00D2FF; --green: #2ECC8A; --red: #FF4F6D; --surface: #101626; --border: rgba(255, 255, 255, 0.08); }
  .app { max-width: 420px; margin: 0 auto; padding-bottom: 100px; min-height: 100vh; position: relative; }
  .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: #0A0F1E; }
  .brand { font-size: 22px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); }
  .balance-card { background: linear-gradient(145deg, #161D2F, #0A0F1E); margin: 15px; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .token-val { font-size: 40px; font-weight: 900; color: var(--gold); letter-spacing: -1px; }
  .taka-val { font-size: 14px; color: #7A82A0; margin-top: 5px; }
  .checkin-container { padding: 0 15px; margin-bottom: 20px; }
  .btn-checkin { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(90deg, #F5C842, #E8A020); color: #000; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(245, 200, 66, 0.3); transition: 0.3s; }
  .btn-checkin:disabled { background: #2A2E39; color: #555; box-shadow: none; cursor: not-allowed; }
  .section-title { padding: 0 20px 10px; font-size: 14px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; }
  .ad-box { background: var(--surface); padding: 20px; border-radius: 18px; margin: 15px auto; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; max-width: 300px; box-shadow: 0 0 15px rgba(0, 210, 255, 0.6); position: relative; }
  .ad-info { text-align: center; margin-bottom: 15px; }
  .ad-info h4 { font-size: 18px; margin-bottom: 8px; color: var(--accent); }
  .ad-info p { font-size: 14px; color: #7A82A0; }
  .btn-watch { padding: 15px 30px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.3s; width: 80%; max-width: 200px; }
  .btn-slot1 { background: var(--accent); color: #000; }
  .btn-slot2 { background: var(--gold); color: #000; }
  .ad-counter { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.5); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
  #ad-overlay { position: fixed; inset: 0; background: #050810; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .timer-circle { width: 100px; height: 100px; border: 5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: var(--gold); box-shadow: 0 0 20px var(--gold-glow); margin-bottom: 30px; }
  .fake-x { position: absolute; top: 30px; right: 30px; font-size: 24px; color: #222; cursor: pointer; display: none; }
  .real-x { position: absolute; top: 30px; right: 30px; font-size: 16px; background: var(--red); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: none; font-weight: bold; }
  .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: #0D1221; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; }
  .nav-btn { flex: 1; border: none; background: none; color: #5B637A; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .nav-btn.active { color: var(--gold); text-shadow: 0 0 12px var(--gold-glow); }
  .page { display: none; }
  .page.active { display: block; }
  .card { background: var(--surface); margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
  .input-field { width: 100%; padding: 15px; background: #070B14; border: 1px solid var(--border); border-radius: 12px; color: white; margin: 10px 0; outline: none; }
  .btn-withdraw { width: 100%; padding: 16px; background: var(--green); border: none; border-radius: 12px; color: #000; font-weight: 800; cursor: pointer; }
  .history-item { background: #0D1221; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); font-size: 13px; }
  .status-p { color: var(--gold); }
  .status-s { color: var(--green); }
  .status-r { color: var(--red); }
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="brand">ADSPHERE REWARDS</div>
        <div id="u-id" style="font-size: 10px; color: #5B637A; margin-top: 5px;">User ID: Loading...</div>
    </div>

    <div class="balance-card">
        <div class="token-val" id="user-tokens">0</div>
        <div style="font-size: 14px; color: var(--gold); font-weight: bold;">TOTAL TOKENS</div>
        <div class="taka-val" id="user-taka">≈ 0.00 Taka</div>
    </div>

    <div id="earn-page" class="page active">
        <div class="checkin-container">
            <button class="btn-checkin" id="btn-checkin" onclick="claimDaily()">
                🎁 Daily Check-in (+<span id="daily-amt">1</span> Tokens)
            </button>
        </div>

        <div class="section-title">📡 Live Ad Slots</div>
        
        <div class="ad-box">
            <span class="ad-counter" id="slot1-counter">0/50</span>
            <div class="ad-info"><h4>Slot 1</h4><p>Watch video • 5 Tokens</p></div>
            <button class="btn-watch btn-slot1" id="btn-slot1" onclick="watchSlot1()">Watch</button>
        </div>

        <div class="ad-box">
            <span class="ad-counter" id="slot2-counter">0/50</span>
            <div class="ad-info"><h4>Slot 2</h4><p>15s Timer • 5 Tokens</p></div>
            <button class="btn-watch btn-slot2" id="btn-slot2" onclick="watchSlot2()">Watch</button>
        </div>

        <div class="section-title">⚡ Extra Tasks</div>
        <div id="dynamic-tasks"></div>
    </div>

    <div id="refer-page" class="page">
        <div class="section-title">👥 Refer & Earn</div>
        <div class="card" style="text-align: center;">
            <input type="text" id="share-link" class="input-field" readonly style="text-align: center; border-color: var(--gold);">
            <button class="btn-watch btn-slot2" style="width: 100%;" onclick="copyLink()">Copy Referral Link</button>
            <div style="margin-top: 15px;">Total Referrals: <span id="ref-count" style="color: var(--gold);">0</span></div>
        </div>
    </div>

    <div id="wallet-page" class="page">
        <div class="section-title">💼 Withdraw Wallet</div>
        <div class="card">
            <p id="withdraw-info" style="font-size: 12px; color: #7A82A0; margin-bottom: 10px;">Loading...</p>
            <p id="ref-status" style="font-size: 13px; color: var(--red); font-weight: bold; margin-bottom: 10px;">Checking...</p>
            <input type="number" id="bkash-num" class="input-field" placeholder="bKash Number">
            <input type="number" id="w-amount" class="input-field" placeholder="Amount of Tokens">
            <button class="btn-withdraw" onclick="withdraw()">Withdraw Now</button>
        </div>
        <div class="section-title">📜 Withdraw History</div>
        <div id="withdraw-list" style="padding: 0 15px; margin-top: 10px;"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="nav('earn', this)"><span>📺</span>Earn</button>
        <button class="nav-btn" onclick="nav('refer', this)"><span>👥</span>Refer</button>
        <button class="nav-btn" onclick="nav('wallet', this)"><span>💼</span>Wallet</button>
    </div>
</div>

<div id="ad-overlay">
    <div class="fake-x" onclick="alert('Wait for timer!')">✖</div>
    <div class="real-x" id="real-x-btn" onclick="completeAdsterra()">✖ Close Ad</div>
    <div class="timer-circle" id="timer-box">15</div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyBW1NgEeWJYwL5_EDcg5b1KsyJttsmhMQY",
  authDomain: "adsphere-rewards.firebaseapp.com",
  databaseURL: "https://adsphere-rewards-default-rtdb.firebaseio.com",
  projectId: "adsphere-rewards",
  storageBucket: "adsphere-rewards.firebasestorage.app",
  messagingSenderId: "919023635999",
  appId: "1:919023635999:web:a93f4572f98bf7fd544f2a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let UID = localStorage.getItem('ads_uid') || "U" + Math.floor(Math.random()*1000000);
localStorage.setItem('ads_uid', UID);

const today = new Date().toLocaleDateString();
let settings = { rate: 100, minWithdraw: 2000, minRef: 5, referralBonus: 100, maxAdsPerSlot: 50 };
// ডিফল্ট ডেটা সেট করা যাতে লোডিং অবস্থায় ০ না দেখায়
let userData = { tokens: 0, referrals: 0, streak: 0, lastCheck: "", completedTasks: {}, adCounts: { slot1: { count: 0, date: today }, slot2: { count: 0, date: today } } };

function syncAll() {
    // Settings load
    db.ref('settings').on('value', (s) => {
        if(s.exists()) {
            settings = {...settings, ...s.val()};
            updateUI();
        }
    });

    // User data load
    db.ref('users/' + UID).on('value', (s) => {
        if(s.exists()) {
            userData = s.val();
            // ডাটাবেস এ ডেটা না থাকলে বা নতুন দিন হলে রিসেট
            if (!userData.adCounts) userData.adCounts = { slot1: { count: 0, date: today }, slot2: { count: 0, date: today } };
            if (userData.adCounts.slot1.date !== today) db.ref('users/'+UID+'/adCounts/slot1').set({count:0, date:today});
            if (userData.adCounts.slot2.date !== today) db.ref('users/'+UID+'/adCounts/slot2').set({count:0, date:today});
        } else {
            db.ref('users/' + UID).set(userData);
        }
        updateUI();
    });

    // Tasks load
    db.ref('tasks').on('value', s => {
        const tasks = s.val();
        const container = document.getElementById('dynamic-tasks');
        container.innerHTML = "";
        for(let id in tasks) {
            const isComp = userData.completedTasks && userData.completedTasks[id];
            container.innerHTML += `<div class="ad-box"><div class="ad-info"><h4>${tasks[id].name}</h4><p>${tasks[id].reward} Tokens</p></div><button class="btn-watch btn-slot1" ${isComp?'disabled':''} onclick="doTask('${id}', '${tasks[id].link}', ${tasks[id].reward})">${isComp?'✅ Done':'Visit'}</button></div>`;
        }
    });

    // Withdraw history load
    db.ref('withdrawals').on('value', s => {
        const list = s.val();
        const container = document.getElementById('withdraw-list');
        container.innerHTML = "";
        let found = false;
        const arr = [];
        for (let id in list) arr.push({ id, ...list[id] });
        arr.sort((a, b) => b.time - a.time);
        arr.forEach(item => {
            if(item.uid === UID) {
                found = true;
                let sClass = (item.status === 'pending') ? 'status-p' : (item.status === 'paid' ? 'status-s' : 'status-r');
                container.innerHTML += `<div class="history-item"><div><b>${item.amount} Tokens</b><br><small>${item.bkash}</small></div><div class="${sClass}">${item.status.toUpperCase()}</div></div>`;
            }
        });
        if(!found) container.innerHTML = `<p style="text-align:center;font-size:12px;color:#555">No history</p>`;
    });
}

function updateUI() {
    document.getElementById('u-id').innerText = "User ID: " + UID;
    document.getElementById('user-tokens').innerText = userData.tokens || 0;
    document.getElementById('user-taka').innerText = `≈ ${((userData.tokens || 0) / settings.rate).toFixed(2)} Taka`;
    document.getElementById('ref-count').innerText = userData.referrals || 0;
    document.getElementById('share-link').value = window.location.origin + window.location.pathname + "?ref=" + UID;
    document.getElementById('daily-amt').innerText = (userData.streak || 0) + 1;
    document.getElementById('withdraw-info').innerHTML = `• Min: ${settings.minWithdraw} | 1 Taka = ${settings.rate} | Req: ${settings.minRef} Refs`;
    
    const status = document.getElementById('ref-status');
    const canWithdraw = (userData.referrals || 0) >= settings.minRef;
    status.innerText = canWithdraw ? "✅ Condition Met!" : `❌ ${settings.minRef} Referrals Needed`;
    status.style.color = canWithdraw ? "var(--green)" : "var(--red)";

    if(userData.lastCheck === today) {
        document.getElementById('btn-checkin').disabled = true;
        document.getElementById('btn-checkin').innerText = "✅ CLAIMED";
    }

    const max = settings.maxAdsPerSlot || 50;
    const s1 = (userData.adCounts && userData.adCounts.slot1) ? userData.adCounts.slot1.count : 0;
    const s2 = (userData.adCounts && userData.adCounts.slot2) ? userData.adCounts.slot2.count : 0;

    document.getElementById('slot1-counter').innerText = `${s1}/${max}`;
    document.getElementById('slot2-counter').innerText = `${s2}/${max}`;
    document.getElementById('btn-slot1').disabled = (s1 >= max);
    document.getElementById('btn-slot2').disabled = (s2 >= max);
}

function claimDaily() {
    if(userData.lastCheck === today) return;
    let reward = (userData.streak || 0) + 1;
    db.ref('users/' + UID).update({ tokens: userData.tokens + reward, streak: reward, lastCheck: today });
    alert("Daily Reward Added!");
}

function watchSlot1() {
    if (typeof show_10935540 === 'function') {
        show_10935540().then(() => {
            const currentCount = (userData.adCounts && userData.adCounts.slot1) ? userData.adCounts.slot1.count : 0;
            db.ref('users/' + UID).update({ tokens: userData.tokens + 5 });
            db.ref('users/' + UID + '/adCounts/slot1').update({ count: currentCount + 1, date: today });
            alert("5 Tokens Added!");
        });
    } else { alert("Ad script not ready. Try again."); }
}

function watchSlot2() {
    window.open("https://www.profitablecpmratenetwork.com/q8n1n0zh8?key=a85d3e74217dd16c5ae7e16e5f3e9e35", "_blank");
    document.getElementById('ad-overlay').style.display = 'flex';
    let count = 15;
    let timer = setInterval(() => {
        count--;
        document.getElementById('timer-box').innerText = count;
        if(count === 5) document.querySelector('.fake-x').style.display = 'block';
        if(count <= 0) {
            clearInterval(timer);
            document.querySelector('.fake-x').style.display = 'none';
            document.getElementById('real-x-btn').style.display = 'block';
        }
    }, 1000);
}

function completeAdsterra() {
    const currentCount = (userData.adCounts && userData.adCounts.slot2) ? userData.adCounts.slot2.count : 0;
    db.ref('users/' + UID).update({ tokens: userData.tokens + 5 });
    db.ref('users/' + UID + '/adCounts/slot2').update({ count: currentCount + 1, date: today });
    document.getElementById('ad-overlay').style.display = 'none';
    document.getElementById('real-x-btn').style.display = 'none';
    document.getElementById('timer-box').innerText = "15";
    alert("5 Tokens Added!");
}

function doTask(taskId, link, reward) {
    window.open(link, "_blank");
    setTimeout(() => {
        db.ref('users/' + UID).update({ tokens: userData.tokens + reward, ["completedTasks/" + taskId]: true });
        alert("Task Complete!");
    }, 5000);
}

function withdraw() {
    const num = document.getElementById('bkash-num').value;
    const amt = parseInt(document.getElementById('w-amount').value);
    if((userData.referrals || 0) < settings.minRef) return alert("Need more refs!");
    if(amt < settings.minWithdraw) return alert("Min withdraw limit!");
    if(userData.tokens < amt) return alert("Low balance!");
    if(num.length < 11) return alert("Invalid bKash.");

    db.ref('withdrawals/').push({ uid: UID, bkash: num, amount: amt, status: "pending", time: Date.now() });
    db.ref('users/' + UID).update({ tokens: userData.tokens - amt });
    alert("Request Sent!");
}

function nav(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id + '-page').classList.add('active');
    btn.classList.add('active');
}

function copyLink() {
    const input = document.getElementById('share-link');
    input.select();
    document.execCommand('copy');
    alert("Referral link copied!");
}

// Referral Logic
const params = new URLSearchParams(window.location.search);
const refBy = params.get('ref');
if(refBy && refBy !== UID && !localStorage.getItem('is_ref')) {
    db.ref('users/' + refBy).once('value', s => {
        if(s.exists()){
            db.ref('users/' + refBy + '/referrals').transaction(c => (c || 0) + 1);
            db.ref('users/' + refBy + '/tokens').transaction(t => (t || 0) + (settings.referralBonus || 100));
            localStorage.setItem('is_ref', 'true');
        }
    });
}

syncAll();
updateUI(); // Initial call
</script>
</body>
</html>
